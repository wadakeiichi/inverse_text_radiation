<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif">
<rect width="900" height="600" fill="#fafbfc"/>
<defs><marker id="rt-b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e79"/></marker>
<marker id="rt-r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#c43f6b"/></marker>
<marker id="rt-k" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0a1929"/></marker>
</defs>
<rect x="150" y="130" width="520" height="120" fill="#e8f0fa" stroke="#1f4e79" stroke-width="2"/>
<text x="410.0" y="114" font-size="16" fill="#1f4e79" text-anchor="middle" font-weight="700">放射する・吸収する媒質（温度 T、ソース関数 S_ν）</text>
<line x1="60" y1="190.0" x2="150" y2="190.0" stroke="#0a1929" stroke-width="3" marker-end="url(#rt-k)"/>
<text x="60" y="176.0" font-size="17" fill="#0a1929" text-anchor="start" font-weight="700" font-style="italic" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">I_ν(0)</text>
<text x="60" y="216.0" font-size="13" fill="#5a6a7a" text-anchor="start">背景光</text>
<line x1="150" y1="190.0" x2="670" y2="190.0" stroke="#0a1929" stroke-width="3" stroke-dasharray="2,3"/>
<circle cx="205" cy="190.0" r="3.2" fill="#c43f6b" opacity="0.42"/>
<line x1="205" y1="190.0" x2="218" y2="190.0" stroke="#c43f6b" stroke-width="2.0" opacity="0.42" marker-end="url(#rt-r)"/>
<circle cx="310" cy="190.0" r="3.2" fill="#c43f6b" opacity="0.58"/>
<line x1="310" y1="190.0" x2="331" y2="190.0" stroke="#c43f6b" stroke-width="2.5" opacity="0.58" marker-end="url(#rt-r)"/>
<circle cx="415" cy="190.0" r="3.2" fill="#c43f6b" opacity="0.74"/>
<line x1="415" y1="190.0" x2="446" y2="190.0" stroke="#c43f6b" stroke-width="3.0" opacity="0.74" marker-end="url(#rt-r)"/>
<circle cx="520" cy="190.0" r="3.2" fill="#c43f6b" opacity="0.88"/>
<line x1="520" y1="190.0" x2="565" y2="190.0" stroke="#c43f6b" stroke-width="3.4" opacity="0.88" marker-end="url(#rt-r)"/>
<circle cx="620" cy="190.0" r="3.2" fill="#c43f6b" opacity="1.0"/>
<line x1="620" y1="190.0" x2="682" y2="190.0" stroke="#c43f6b" stroke-width="3.8" opacity="1.0" marker-end="url(#rt-r)"/>
<text x="410.0" y="274" font-size="14" fill="#c43f6b" text-anchor="middle">各点が S_ν を放出 → 観測者へ（→）。手前の層ほど減衰が小さく寄与が大きい（∝ e^(−(τ_ν−τ′)))</text>
<line x1="670" y1="190.0" x2="780" y2="190.0" stroke="#0a1929" stroke-width="3.4" marker-end="url(#rt-k)"/>
<text x="788" y="176.0" font-size="18" fill="#0a1929" text-anchor="start" font-weight="700" font-style="italic" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">I_ν(τ_ν)</text>
<text x="788" y="214.0" font-size="13" fill="#5a6a7a" text-anchor="start">観測者へ</text>
<line x1="150" y1="308" x2="670" y2="308" stroke="#0a1929" stroke-width="1.6"/>
<text x="150" y="330" font-size="14" fill="#5a6a7a" text-anchor="middle" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">τ_ν = 0</text>
<text x="670" y="330" font-size="14" fill="#5a6a7a" text-anchor="middle" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">τ_ν</text>
<line x1="150" y1="302" x2="150" y2="314" stroke="#0a1929" stroke-width="1.4"/>
<line x1="670" y1="302" x2="670" y2="314" stroke="#0a1929" stroke-width="1.4"/>
<rect x="150" y="360" width="600" height="64" rx="10" fill="#fff" stroke="#0a1929" stroke-width="1.8"/>
<text x="450" y="390" font-size="20" fill="#0a1929" text-anchor="middle" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">I_ν(τ_ν) = I_ν(0) e^(−τ_ν) + ∫_0^τ_ν S_ν(τ′) e^(−(τ_ν−τ′)) dτ′</text>
<text x="300" y="414" font-size="13" fill="#1f4e79" text-anchor="middle">背景光の減衰</text>
<text x="560" y="414" font-size="13" fill="#c43f6b" text-anchor="middle">媒質の放出の積算</text>
<line x1="300" y1="398" x2="300" y2="404" stroke="#1f4e79" stroke-width="1.2"/>
<line x1="560" y1="398" x2="560" y2="404" stroke="#c43f6b" stroke-width="1.2"/>
<rect x="60" y="470" width="360" height="110" rx="10" fill="#1f4e79" fill-opacity="0.06" stroke="#1f4e79" stroke-width="1.6"/>
<text x="240.0" y="498" font-size="17" fill="#1f4e79" text-anchor="middle" font-weight="700">光学的に厚い極限　τ_ν ≫ 1</text>
<text x="240.0" y="528" font-size="22" fill="#0a1929" text-anchor="middle" font-weight="700" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">I_ν → S_ν</text>
<text x="240.0" y="556" font-size="14" fill="#5a6a7a" text-anchor="middle">LTE では S_ν = B_ν → 黒体に漸近</text>
<rect x="480" y="470" width="360" height="110" rx="10" fill="#c43f6b" fill-opacity="0.06" stroke="#c43f6b" stroke-width="1.6"/>
<text x="660.0" y="498" font-size="17" fill="#8a1f3e" text-anchor="middle" font-weight="700">光学的に薄い極限　τ_ν ≪ 1</text>
<text x="660.0" y="528" font-size="20" fill="#0a1929" text-anchor="middle" font-weight="700" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">I_ν ≈ I_ν(0) + S_ν τ_ν</text>
<text x="660.0" y="556" font-size="14" fill="#5a6a7a" text-anchor="middle">放出の単純な積算（輝線・薄い星雲）</text>
<text x="450.0" y="52" font-size="1" fill="#0a1929" text-anchor="middle"></text>
</svg>
