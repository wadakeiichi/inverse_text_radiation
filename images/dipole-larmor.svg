<text x="276" y="184" font-size="18" fill="#8a1f3e" text-anchor="end" font-weight="700">加速度 a</text>
<text x="290" y="142" font-size="13" fill="#5a6a7a" text-anchor="middle">（軸）</text>
<circle cx="290" cy="270" r="9" fill="#8a1f3e"/>
<text x="274" y="276" font-size="17" fill="#8a1f3e" text-anchor="end" font-style="italic" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">e</text>
<line x1="290" y1="270" x2="458.7" y2="201.8" stroke="#0a1929" stroke-width="1.8" stroke-dasharray="2,4"/>
<text x="454.7474615311553" y="192.821599998304" font-size="13" fill="#5a6a7a" text-anchor="end">放射方向</text>
<path d="M 290 212.0 A 58 58 0 0 1 343.8 248.3" fill="none" stroke="#0a1929" stroke-width="1.7"/>
<text x="333.61704647071826" y="211.33506934070675" font-size="18" fill="#0a1929" text-anchor="middle" font-style="italic" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">θ</text>
<text x="290" y="46" font-size="15" fill="#5a6a7a" text-anchor="middle">放射ゼロ（a に平行）</text>
<text x="290" y="512" font-size="15" fill="#5a6a7a" text-anchor="middle">放射ゼロ（a に平行）</text>
<text x="102" y="276" font-size="15" fill="#1f4e79" text-anchor="end" font-weight="700">最大</text>
<text x="478" y="276" font-size="15" fill="#1f4e79" text-anchor="start" font-weight="700">最大</text>
<text x="290" y="420" font-size="17" fill="#1f4e79" text-anchor="middle" font-weight="700" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">∝ sin²θ</text>
<line x1="530" y1="70" x2="530" y2="470" stroke="#e3e9f0" stroke-width="1.4"/>
<text x="560" y="110" font-size="18" fill="#0a1929" text-anchor="start" font-weight="700">加速された電荷は電磁波を放つ</text>
<text x="560" y="150" font-size="15" fill="#5a6a7a" text-anchor="start">単位立体角あたりの放射:</text>
<text x="560" y="184" font-size="19" fill="#1f4e79" text-anchor="start" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">dP/dΩ = (e²a² / 4πc³) sin²θ</text>
<text x="560" y="232" font-size="15" fill="#5a6a7a" text-anchor="start">全立体角で積分すると Larmor 公式:</text>
<rect x="558" y="252" width="320" height="56" rx="8" fill="#e8f0fa" stroke="#1f4e79" stroke-width="1.6"/>
<text x="718" y="290" font-size="22" fill="#8a1f3e" text-anchor="middle" font-weight="700" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">P = (2/3) · e²a² / c³</text>
<text x="560" y="352" font-size="15" fill="#5a6a7a" text-anchor="start">これが連続放射の物理的土台:</text>
<text x="560" y="384" font-size="16" fill="#0a1929" text-anchor="start">・ 自由–自由放射（制動放射）― 第19章</text>
<text x="560" y="414" font-size="16" fill="#0a1929" text-anchor="start">・ シンクロトロン放射 ― 第18章</text>
<text x="560" y="444" font-size="14" fill="#8a99a8" text-anchor="start">放射の向きは加速度に垂直で最大、平行でゼロ。</text>
