<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- =============================================================
       Central Map (Continuous Side): Planck Function
       中心地図（連続側）― 各因子と章の対応
       Base version (no factor highlighted).
       Labels in English; Japanese caption goes in body .qmd.
       License: CC BY 4.0
       ============================================================= -->

  <defs>
    <!-- Arrowhead marker for factor-to-part arrows -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f4e79"/>
    </marker>
    <marker id="arrow-thin" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a91ad"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#fafbfc"/>

  <!-- ============================================================
       Top title strip
       ============================================================ -->
  <text x="450" y="38" text-anchor="middle"
        font-size="20" font-weight="700" fill="#0a1929"
        letter-spacing="0.08em">
    CENTRAL MAP — Continuous Spectrum
  </text>
  <text x="450" y="60" text-anchor="middle"
        font-size="13" fill="#5a6a7a">
    Planck function and its inverse-derivation path
  </text>

  <!-- ============================================================
       Center: Planck function box
       ============================================================ -->
  <g transform="translate(450, 200)">
    <!-- Outer frame -->
    <rect x="-260" y="-50" width="520" height="130" rx="10"
          fill="#ffffff" stroke="#1f4e79" stroke-width="2"/>

    <!-- The Planck function.
         Math set in serif italic. Every glyph run is an absolutely
         positioned <text> (no tspan dx/dy) so the layout is identical
         in browsers, cairosvg, librsvg and PDF builds.
         Layout: LHS -168..-99, "=" at -75, prefactor bar -45..35,
         dot at 47, occupation bar 60..190. Fraction bars at y=0. -->
    <g font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif"
       fill="#0a1929">
      <!-- LHS: B_ν(T) = -->
      <text x="-168" y="9"  font-size="26" font-style="italic">B</text>
      <text x="-149" y="15" font-size="17" font-style="italic">ν</text>
      <text x="-139" y="9"  font-size="26" font-style="italic">(T)</text>
      <text x="-75"  y="8"  font-size="24" text-anchor="middle">=</text>

      <!-- Prefactor 2hν³/c² -->
      <g id="factor-prefactor">
        <text x="-27" y="-10" font-size="20" font-style="italic">2hν</text>
        <text x="6"   y="-17" font-size="14" font-style="italic">3</text>
        <line x1="-45" y1="0" x2="35" y2="0"
              stroke="#0a1929" stroke-width="1.5"/>
        <text x="-13" y="24" font-size="20" font-style="italic">c</text>
        <text x="-3"  y="17" font-size="14" font-style="italic">2</text>
      </g>

      <!-- multiplication sign (vertically centred on the fraction bars) -->
      <text x="47" y="7" text-anchor="middle" font-size="22">·</text>

      <!-- Occupation factor 1/(e^(hν/kT) − 1) -->
      <g id="factor-occupation">
        <text x="125" y="-10" text-anchor="middle" font-size="20">1</text>
        <line x1="60" y1="0" x2="190" y2="0"
              stroke="#0a1929" stroke-width="1.5"/>
        <text x="88"  y="24" font-size="19" font-style="italic">e</text>
        <text x="99"  y="14" font-size="13" font-style="italic">hν/kT</text>
        <text x="136" y="24" font-size="19">− 1</text>
      </g>
    </g>

    <!-- Factor underlines (aligned with the fraction bars above;
         default: all gray; variants override these) -->
    <g id="factor-underlines">
      <!-- Prefactor underline -->
      <line id="ul-prefactor"
            x1="-45" y1="44" x2="35" y2="44"
            stroke="#a8c5e0" stroke-width="3" stroke-linecap="round"/>
      <!-- Occupation underline -->
      <line id="ul-occupation"
            x1="60" y1="44" x2="190" y2="44"
            stroke="#a8c5e0" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Factor labels under each factor (centred on the underlines) -->
    <text x="-5" y="64" text-anchor="middle"
          font-size="10" fill="#5a6a7a" letter-spacing="0.05em">
      MODES + QUANTUM
    </text>
    <text x="125" y="64" text-anchor="middle"
          font-size="10" fill="#5a6a7a" letter-spacing="0.05em">
      BOSE OCCUPATION
    </text>
  </g>

  <!-- ============================================================
       Four part-boxes around the central function
       (Top-Left, Top-Right, Bottom-Left, Bottom-Right)
       ============================================================ -->

  <!-- Part III: Bose statistics (top-right) -->
  <g transform="translate(700, 130)">
    <rect x="-80" y="-30" width="160" height="65" rx="8"
          fill="#fff9e6" stroke="#d4a017" stroke-width="1.5"/>
    <text x="0" y="-10" text-anchor="middle"
          font-size="11" font-weight="700" fill="#7a5a00"
          letter-spacing="0.08em">PART III</text>
    <text x="0" y="8" text-anchor="middle"
          font-size="12" fill="#0a1929">Statistical Mechanics</text>
    <text x="0" y="24" text-anchor="middle"
          font-size="10" fill="#5a6a7a">Ch. 6–8 · Bose statistics, μ = 0</text>
  </g>

  <!-- Part IV: Quantum (bottom-right) -->
  <g transform="translate(700, 290)">
    <rect x="-80" y="-30" width="160" height="65" rx="8"
          fill="#fff9e6" stroke="#d4a017" stroke-width="1.5"/>
    <text x="0" y="-10" text-anchor="middle"
          font-size="11" font-weight="700" fill="#7a5a00"
          letter-spacing="0.08em">PART IV</text>
    <text x="0" y="8" text-anchor="middle"
          font-size="12" fill="#0a1929">Quantum Theory</text>
    <text x="0" y="24" text-anchor="middle"
          font-size="10" fill="#5a6a7a">Ch. 9–12 · Energy quantum hν</text>
  </g>

  <!-- Part V: EM modes (top-left) -->
  <g transform="translate(200, 130)">
    <rect x="-80" y="-30" width="160" height="65" rx="8"
          fill="#e8f0fa" stroke="#1f4e79" stroke-width="1.5"/>
    <text x="0" y="-10" text-anchor="middle"
          font-size="11" font-weight="700" fill="#0a3260"
          letter-spacing="0.08em">PART V</text>
    <text x="0" y="8" text-anchor="middle"
          font-size="12" fill="#0a1929">Electromagnetism</text>
    <text x="0" y="24" text-anchor="middle"
          font-size="9" fill="#5a6a7a">Ch. 13–14 · Modes 8πν²/c³ · 2 pol.</text>
  </g>

  <!-- Part VI: Deviations (bottom-left) -->
  <g transform="translate(200, 290)">
    <rect x="-80" y="-30" width="160" height="65" rx="8"
          fill="#e8f0fa" stroke="#1f4e79" stroke-width="1.5"/>
    <text x="0" y="-10" text-anchor="middle"
          font-size="11" font-weight="700" fill="#0a3260"
          letter-spacing="0.08em">PART VI</text>
    <text x="0" y="8" text-anchor="middle"
          font-size="12" fill="#0a1929">Real-Universe Deviations</text>
    <text x="0" y="24" text-anchor="middle"
          font-size="10" fill="#5a6a7a">Ch. 15–18 · CMB, stars, disks</text>
  </g>

  <!-- ============================================================
       Arrows from factors to parts (inverse direction: factor ← part)
       The arrow shows "Part III explains the occupation factor", etc.
       ============================================================ -->

  <!-- From PART III (top-right) → occupation factor (tip above the "1") -->
  <path d="M 618 148 Q 545 150 573 176"
        fill="none" stroke="#1f4e79" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <text x="622" y="170" text-anchor="start" font-size="9"
        fill="#5a6a7a" font-style="italic">explains</text>

  <!-- From PART IV (bottom-right) → quantum factor (tip beside the exponent e^hν/kT) -->
  <path d="M 622 270 Q 600 248 645 226"
        fill="none" stroke="#1f4e79" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <text x="622" y="252" text-anchor="start" font-size="9"
        fill="#5a6a7a" font-style="italic">hν origin</text>

  <!-- From PART V (top-left) → prefactor 2hν³/c² (tip above the numerator) -->
  <path d="M 282 148 Q 370 150 432 176"
        fill="none" stroke="#1f4e79" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <text x="278" y="170" text-anchor="end" font-size="9"
        fill="#5a6a7a" font-style="italic">modes + pol.</text>

  <!-- From PART VI (bottom-left) → entire B_ν (tip below the B_ν(T) symbol) -->
  <path d="M 282 272 Q 320 252 330 226"
        fill="none" stroke="#1f4e79" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <text x="278" y="252" text-anchor="end" font-size="9"
        fill="#5a6a7a" font-style="italic">deviations</text>

  <!-- ============================================================
       Bottom: I-II observation side, VIII unification side
       ============================================================ -->

  <!-- Observation: Part I-II input -->
  <g transform="translate(150, 470)">
    <rect x="-95" y="-25" width="190" height="60" rx="8"
          fill="#fbe9eb" stroke="#c43f6b" stroke-width="1.5"/>
    <text x="0" y="-7" text-anchor="middle"
          font-size="11" font-weight="700" fill="#8a1f3e"
          letter-spacing="0.08em">PARTS I–II</text>
    <text x="0" y="10" text-anchor="middle"
          font-size="12" fill="#0a1929">Observed continuous spectra</text>
    <text x="0" y="24" text-anchor="middle"
          font-size="10" fill="#5a6a7a">Sun · CMB · dust · accretion disks</text>
  </g>

  <!-- Arrow: observation → central function (input) -->
  <path d="M 245 460 Q 360 380 390 250"
        fill="none" stroke="#c43f6b" stroke-width="1.5"
        marker-end="url(#arrow-thin)"
        stroke-dasharray="5,3"/>
  <text x="295" y="395" text-anchor="middle"
        font-size="10" fill="#8a1f3e" font-style="italic">
    starting point
  </text>

  <!-- Unification: Part VIII output -->
  <g transform="translate(750, 470)">
    <rect x="-95" y="-25" width="190" height="60" rx="8"
          fill="#ede5f7" stroke="#5e2d91" stroke-width="1.5"/>
    <text x="0" y="-7" text-anchor="middle"
          font-size="11" font-weight="700" fill="#3e1a6a"
          letter-spacing="0.08em">PART VIII</text>
    <text x="0" y="10" text-anchor="middle"
          font-size="12" fill="#0a1929">QED unification</text>
    <text x="0" y="24" text-anchor="middle"
          font-size="10" fill="#5a6a7a">also unifies with line spectrum</text>
  </g>

  <!-- Arrow: central function → Part VIII (synthesis) -->
  <path d="M 655 250 Q 720 380 655 460"
        fill="none" stroke="#5e2d91" stroke-width="1.5"
        marker-end="url(#arrow-thin)"
        stroke-dasharray="5,3"/>
  <text x="715" y="395" text-anchor="middle"
        font-size="10" fill="#3e1a6a" font-style="italic">
    synthesis
  </text>

  <!-- ============================================================
       Footer caption (English; Japanese in body .qmd caption)
       ============================================================ -->
  <text x="450" y="555" text-anchor="middle"
        font-size="11" fill="#5a6a7a" font-style="italic">
    Inverse-derivation map: each factor of B_ν(T) traces to a chapter group; Part VIII unifies all.
  </text>
</svg>
