<text x="194.34090909090907" y="298.5769230769231" font-size="14" fill="#2e7d5b" text-anchor="middle">光学的に薄い</text>
<text x="194.34090909090907" y="316.5769230769231" font-size="13" fill="#5a6a7a" text-anchor="middle">コアが線形に成長</text>
<text x="375.39772727272725" y="303.1036198669323" font-size="14" fill="#1f4e79" text-anchor="middle">コアが飽和</text>
<text x="375.39772727272725" y="321.1036198669323" font-size="13" fill="#5a6a7a" text-anchor="middle">（Doppler コア）</text>
<text x="647.7840909090909" y="144.58551954615126" font-size="14" fill="#c43f6b" text-anchor="middle">Lorentz 翼が成長</text>
<text x="647.7840909090909" y="162.58551954615126" font-size="13" fill="#5a6a7a" text-anchor="middle">（減衰翼）</text>
<text x="447.5" y="522" font-size="18" fill="#0a1929" text-anchor="middle" font-style="italic" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif">log 柱密度 N（× f λ）　→</text>
<text x="38" y="277.5" font-size="18" fill="#0a1929" text-anchor="middle" font-style="italic" font-family="Georgia, 'STIX Two Text', 'Times New Roman', serif" transform="rotate(-90 38 277.5)">log 等価幅 W_λ</text>
<text x="450.0" y="548" font-size="14" fill="#8a99a8" text-anchor="middle">等価幅と柱密度の関係（成長曲線）― 同じ等価幅でも、どの領域にいるかで密度感度が変わる ― 第24章 §24.2</text>
