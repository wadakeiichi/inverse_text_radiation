name: Quarto Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

# Node.js 24 への強制移行（2026-06-16〜）に備えて環境変数を設定。
# 詳細: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up TeX Live (for PDF build)
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      - name: Install Japanese fonts, IBM Plex, and SVG renderer
        run: |
          sudo apt-get update
          # Noto CJK は fallback として残す
          sudo apt-get install -y \
            fonts-noto-cjk fonts-noto-cjk-extra \
            librsvg2-bin \
            fontconfig unzip
          # IBM Plex（公式 GitHub Release から OTF を取得）
          mkdir -p /tmp/ibm-plex
          cd /tmp/ibm-plex
          curl -sL -o ibm-plex.zip \
            https://github.com/IBM/plex/releases/download/%40ibm%2Fplex-sans-jp%401.1.0/ibm-plex-sans-jp.zip
          unzip -q ibm-plex.zip
          curl -sL -o ibm-plex-sans.zip \
            https://github.com/IBM/plex/releases/download/%40ibm%2Fplex-sans%401.1.0/ibm-plex-sans.zip
          unzip -q ibm-plex-sans.zip
          curl -sL -o ibm-plex-mono.zip \
            https://github.com/IBM/plex/releases/download/%40ibm%2Fplex-mono%401.1.0/ibm-plex-mono.zip
          unzip -q ibm-plex-mono.zip
          # システムフォントとして配置
          sudo mkdir -p /usr/local/share/fonts/ibm-plex
          sudo find . -name "*.otf" -exec cp {} /usr/local/share/fonts/ibm-plex/ \;
          sudo find . -name "*.ttf" -exec cp {} /usr/local/share/fonts/ibm-plex/ \;
          sudo fc-cache -fv
          fc-list | grep -i "plex" | head -5 || echo "IBM Plex not registered (will fall back to Noto)"

      - name: Render Quarto book (HTML + PDF + EPUB)
        run: quarto render

      - name: Publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
